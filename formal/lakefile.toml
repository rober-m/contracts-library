name = "formal"
defaultTargets = ["Formal"]

# Parallel proof checking.
moreLeanArgs = ["--threads=4"]
moreGlobalServerArgs = ["--threads=4"]

# Lean-Blaster: SMT (Z3) backend for discharging properties via the `blaster`
# tactic/command. Requires Z3 4.15.2 on PATH at build time. See README.md.
# Will move back to main when merged
[[require]]
name = "Blaster"
git = "https://github.com/input-output-hk/Lean-blaster"
rev = "beta-lambda-cache-optimization"

# UPLC AST + CEK machine — lets proofs load and execute the *compiled*
# validator (`#import_blueprints`, `cekExecuteProgram`).
# Will move back to main when merged
[[require]]
name = "PlutusCore"
git = "https://github.com/input-output-hk/PlutusCoreBlaster"
rev = "feat/blueprint-parsing"

# Cardano ledger types (V3 ScriptContext / TxInfo / TxOut / Value / Data) used
# to build the script context the validator runs against.
[[require]]
name = "CardanoLedgerApi"
git = "https://github.com/input-output-hk/CardanoLedgerApiBlaster"
rev = "main"

[[lean_lib]]
name = "Formal"
